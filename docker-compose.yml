services:
  db:
    image: postgres:14-alpine
    container_name: doc_processor_db
    restart: unless-stopped
    networks:
      - app-network
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-intelligent_docs}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-intelligent_docs}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doc_processor_redis
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc_processor_qdrant
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__STORAGE__STORAGE_PATH: "/qdrant/storage"
      QDRANT__SERVICE__GRPC_PORT: 6334
    # No healthcheck: the qdrant image ships no wget/curl/bash to probe /readyz.
    # Readiness is verified at runtime via the app's /api/v1/health/ready.

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: doc_processor_api
    restart: unless-stopped
    # Local dev: hot-reload (source is bind-mounted below). Prod image CMD has no --reload.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - app-network
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Individual vars (for app/core/config.py)
      # Use variable names from .env
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-intelligent_docs}
      DB_HOST: db
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}

      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      QDRANT_API_KEY: ${QDRANT_API_KEY}

      # Composite URLs
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-intelligent_docs}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        # service_started (not _healthy): the qdrant image ships no wget/curl so
        # the HTTP healthcheck can't pass. The app's /health/ready checks qdrant
        # at runtime instead.
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./uploads:/app/uploads
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import requests; requests.get(\"http://localhost:8000/health\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: doc_processor_worker
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    networks:
      - app-network
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-intelligent_docs}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./scripts:/app/scripts

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: doc_processor_flower
    restart: unless-stopped
    # Override entrypoint.sh (which runs DB migrations) — Flower only needs the
    # Redis broker, not Postgres.
    entrypoint: ["celery", "-A", "app.core.celery_app", "flower", "--port=5555"]
    networks:
      - app-network
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - worker

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  qdrant_storage:
